<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ScreenClip Server</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 { color: #e94560; margin-bottom: 20px; }
    #status {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 16px;
      width: 80%;
      margin-bottom: 20px;
      font-size: 1rem;
    }
    .running { border-color: #2ecc71 !important; color: #2ecc71 !important; }
    .stopped { border-color: #e74c3c !important; color: #e74c3c !important; }
    .starting { border-color: #3498db !important; color: #3498db !important; }
    
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 5px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { background: #555; cursor: not-allowed; }

    .btn-force {
      background: #c0392b;
      color: white;
      border: 2px solid #e74c3c;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 5px;
    }
    .btn-force:hover { background: #e74c3c; opacity: 1; }
    .btn-force:disabled { background: #555; border-color: #555; cursor: not-allowed; }

    .force-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #333;
    }
    
    #info {
      margin-top: 15px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>ScreenClip</h1>
  <div id="status" class="stopped">Сервер не запущен</div>
  <div>
    <button class="btn" id="startBtn">▶ Запустить</button>
    <button class="btn" id="stopBtn" disabled>⏹ Остановить</button>
    <button class="btn" id="restartBtn" disabled>Перезапустить</button>
  </div>
  <div class="force-section">
    <button class="btn-force" id="forceStopBtn" disabled>💀 Принудительная остановка</button>
  </div>
  <div id="info">
    Загрузка IP...
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const restartBtn = document.getElementById('restartBtn');
    const forceStopBtn = document.getElementById('forceStopBtn');
    const infoEl = document.getElementById('info');

    // Загружаем IP при запуске
    ipcRenderer.invoke('get-local-ip').then((ip) => {
      infoEl.innerHTML = `IP: ${ip}<br>Порт: 3000<br>Телефон должен быть в той же сети`;
    }).catch(() => {
      infoEl.innerHTML = `IP: не удалось определить<br>Порт: 3000<br>Телефон должен быть в той же сети`;
    });

    // Показываем API key
    ipcRenderer.invoke('get-api-key').then((key) => {
      infoEl.innerHTML += `<br>API Key: <code style="user-select:all">${key}</code>`;
    });

    function updateButtons(status) {
      if (status === 'running') {
        startBtn.disabled = true;
        stopBtn.disabled = false;
        restartBtn.disabled = false;
        forceStopBtn.disabled = false;
      } else {
        startBtn.disabled = false;
        stopBtn.disabled = true;
        restartBtn.disabled = true;
        forceStopBtn.disabled = true;
      }
    }

    ipcRenderer.on('server-status', (event, data) => {
      statusEl.textContent = data.message;
      statusEl.className = data.status;
      updateButtons(data.status);
    });

    // Запрос текущего статуса при загрузке
    ipcRenderer.invoke('get-server-status').then((data) => {
      if (data.isRunning) {
        statusEl.textContent = 'Сервер запущен';
        statusEl.className = 'running';
        updateButtons('running');
      } else {
        statusEl.textContent = 'Сервер не запущен';
        statusEl.className = 'stopped';
        updateButtons('stopped');
      }
    });

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      statusEl.textContent = 'Запуск...';
      statusEl.className = 'starting';
      await ipcRenderer.invoke('start-server');
    });

    stopBtn.addEventListener('click', async () => {
      stopBtn.disabled = true;
      statusEl.textContent = 'Остановка...';
      statusEl.className = 'starting';
      await ipcRenderer.invoke('stop-server');
    });

    restartBtn.addEventListener('click', async () => {
      restartBtn.disabled = true;
      statusEl.textContent = 'Перезапуск...';
      statusEl.className = 'starting';
      await ipcRenderer.invoke('restart-server');
    });

    forceStopBtn.addEventListener('click', async () => {
      if (confirm('Принудительно остановить все процессы? Это завершит сервер и все связанные процессы.')) {
        forceStopBtn.disabled = true;
        statusEl.textContent = 'Принудительная остановка...';
        statusEl.className = 'starting';
        await ipcRenderer.invoke('force-stop-all');
      }
    });
  </script>
</body>
</html>
