<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ScreenClip Server</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Верхняя панель — управление сервером */
    .control-panel {
      padding: 15px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    h1 {
      color: #e94560;
      margin: 0 0 12px 0;
      font-size: 1.2rem;
      text-align: center;
    }
    #status {
      background: #0f3460;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      text-align: center;
    }
    .running { border-color: #2ecc71 !important; color: #2ecc71 !important; }
    .stopped { border-color: #e74c3c !important; color: #e74c3c !important; }
    .starting { border-color: #3498db !important; color: #3498db !important; }

    .btn-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
    .btn-force {
      background: #c0392b;
      border: 1px solid #e74c3c;
    }
    .btn-force:hover { background: #e74c3c; }

    #info {
      margin-top: 10px;
      font-size: 0.7rem;
      color: #888;
      text-align: center;
    }

    /* Превью скриншота */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      overflow: hidden;
    }
    .preview-label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 8px;
    }
    .preview-container {
      position: relative;
      width: 100%;
      max-width: 350px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f3460;
      border-radius: 8px;
      overflow: hidden;
    }
    .preview-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
    .preview-container img.visible {
      display: block;
    }
    .preview-placeholder {
      color: #555;
      font-size: 0.85rem;
      text-align: center;
      padding: 20px;
    }
    .preview-placeholder.hidden {
      display: none;
    }

    .preview-actions {
      margin-top: 10px;
      display: flex;
      gap: 6px;
    }
    .btn-save {
      background: #2ecc71;
      color: #1a1a2e;
      font-weight: bold;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { background: #444; color: #888; cursor: not-allowed; }

    .screenshot-meta {
      font-size: 0.7rem;
      color: #666;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Панель управления -->
  <div class="control-panel">
    <h1>📸 ScreenClip</h1>
    <div id="status" class="stopped">Сервер не запущен</div>
    <div class="btn-row">
      <button class="btn" id="startBtn">▶ Запустить</button>
      <button class="btn" id="stopBtn" disabled>⏹ Остановить</button>
      <button class="btn" id="restartBtn" disabled>🔄 Перезапустить</button>
    </div>
    <div class="btn-row" style="margin-top: 6px;">
      <button class="btn btn-force" id="forceStopBtn" disabled>💀 Принуд. остановка</button>
    </div>
    <div id="info">Загрузка...</div>
  </div>

  <!-- Превью скриншота -->
  <div class="preview-panel">
    <div class="preview-label">Последний скриншот</div>
    <div class="preview-container">
      <img id="previewImg" alt="Screenshot preview">
      <div id="placeholder" class="preview-placeholder">
        Запустите сервер и<br>отправьте скриншот с телефона
      </div>
    </div>
    <div class="screenshot-meta" id="screenshotMeta"></div>
    <div class="preview-actions">
      <button class="btn btn-save" id="saveBtn" disabled>💾 Сохранить</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const restartBtn = document.getElementById('restartBtn');
    const forceStopBtn = document.getElementById('forceStopBtn');
    const infoEl = document.getElementById('info');
    const previewImg = document.getElementById('previewImg');
    const placeholder = document.getElementById('placeholder');
    const saveBtn = document.getElementById('saveBtn');
    const screenshotMeta = document.getElementById('screenshotMeta');

    let lastScreenshotData = null; // base64 данные для сохранения
    let lastApiKey = '';
    let pollInterval = null;

    // Копирование API key по клику
    infoEl.addEventListener('click', () => {
      const code = infoEl.querySelector('code');
      if (code && lastApiKey) {
        navigator.clipboard.writeText(lastApiKey);
        const orig = code.textContent;
        code.textContent = '✓ Скопировано!';
        setTimeout(() => { code.textContent = orig; }, 1500);
      }
    });

    // Загрузка IP и API key
    Promise.all([
      ipcRenderer.invoke('get-local-ip'),
      ipcRenderer.invoke('get-api-key')
    ]).then(([ip, key]) => {
      lastApiKey = key;
      infoEl.innerHTML = `IP: ${ip} | Порт: 3000<br>API Key: <code style="user-select:all;cursor:pointer" title="Кликните для копирования">${key}</code>`;
    }).catch(() => {
      infoEl.innerHTML = 'IP: не удалось определить | Порт: 3000';
    });

    function updateButtons(status) {
      const isRunning = status === 'running';
      startBtn.disabled = isRunning;
      stopBtn.disabled = !isRunning;
      restartBtn.disabled = !isRunning;
      forceStopBtn.disabled = !isRunning;
    }

    ipcRenderer.on('server-status', (event, data) => {
      statusEl.textContent = data.message;
      statusEl.className = data.status;
      updateButtons(data.status);

      if (data.status === 'running') {
        startPolling();
      } else if (data.status !== 'running') {
        stopPolling();
      }
    });

    // Запрос текущего статуса при загрузке
    ipcRenderer.invoke('get-server-status').then((data) => {
      if (data && data.isRunning) {
        statusEl.textContent = 'Сервер запущен';
        statusEl.className = 'running';
        updateButtons('running');
        startPolling();
      } else {
        statusEl.textContent = 'Сервер не запущен';
        statusEl.className = 'stopped';
        updateButtons('stopped');
      }
    }).catch(() => {
      statusEl.textContent = 'Сервер не запущен';
      statusEl.className = 'stopped';
      updateButtons('stopped');
    });

    // Кнопки управления
    startBtn.addEventListener('click', () => {
      startBtn.disabled = true;
      statusEl.textContent = 'Запуск...';
      statusEl.className = 'starting';
      ipcRenderer.invoke('start-server');
    });

    stopBtn.addEventListener('click', () => {
      stopBtn.disabled = true;
      statusEl.textContent = 'Остановка...';
      statusEl.className = 'starting';
      ipcRenderer.invoke('stop-server');
    });

    restartBtn.addEventListener('click', () => {
      restartBtn.disabled = true;
      statusEl.textContent = 'Перезапуск...';
      statusEl.className = 'starting';
      ipcRenderer.invoke('restart-server');
    });

    forceStopBtn.addEventListener('click', () => {
      if (confirm('Принудительно остановить все процессы ScreenClip?')) {
        forceStopBtn.disabled = true;
        statusEl.textContent = 'Принудительная остановка...';
        ipcRenderer.invoke('force-stop-all');
      }
    });

    // Опрос скриншотов каждые 2 секунды (прямой HTTP)
    let pollCount = 0;
    function startPolling() {
      if (pollInterval) return;
      pollInterval = setInterval(pollScreenshot, 2000);
      pollScreenshot();
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    async function pollScreenshot() {
      pollCount++;
      try {
        const response = await fetch('http://localhost:3000/screenshot-info');
        const info = await response.json();
        if (info && info.hasScreenshot) {
          const meta = screenshotMeta.dataset.timestamp;
          if (meta != info.timestamp) {
            const imgResp = await fetch('http://localhost:3000/latest-screenshot');
            const imgData = await imgResp.json();
            if (imgData && imgData.data) {
              previewImg.src = 'data:image/png;base64,' + imgData.data;
              previewImg.classList.add('visible');
              placeholder.classList.add('hidden');
              saveBtn.disabled = false;
              lastScreenshotData = imgData.data;
              const date = new Date(imgData.timestamp);
              const timeStr = date.toLocaleTimeString('ru-RU');
              const sizeKb = Math.round(imgData.size / 1024);
              screenshotMeta.textContent = `${timeStr} • ${sizeKb} КБ`;
              screenshotMeta.dataset.timestamp = imgData.timestamp;
            }
          }
        } else {
          previewImg.classList.remove('visible');
          placeholder.classList.remove('hidden');
          saveBtn.disabled = true;
          screenshotMeta.textContent = '';
          lastScreenshotData = null;
        }
      } catch (e) {
        // Ignore poll errors
      }
    }

    // Сохранение скриншота
    saveBtn.addEventListener('click', async () => {
      if (!lastScreenshotData) return;
      saveBtn.disabled = true;
      saveBtn.textContent = '⏳ Сохранение...';
      const saved = await ipcRenderer.invoke('save-screenshot', lastScreenshotData);
      saveBtn.textContent = '💾 Сохранить';
      saveBtn.disabled = false;
      if (saved) {
        screenshotMeta.textContent += ' ✓ Сохранено';
      }
    });
  </script>
</body>
</html>
